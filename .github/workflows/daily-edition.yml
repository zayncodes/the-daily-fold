name: Daily Edition

# Publishes a fresh edition of The Chronicle once a day, then commits it.
# The commit triggers your host (Cloudflare Pages / Vercel / Netlify) to redeploy.

on:
  schedule:
    # 00:30 UTC == 06:00 IST. Cron is always UTC on GitHub Actions.
    - cron: "30 0 * * *"
  workflow_dispatch: # lets you run it manually from the Actions tab

# Allow the workflow to commit the generated edition back to the repo.
permissions:
  contents: write

concurrency:
  group: daily-edition
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate today's edition
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDITION_MODEL: ${{ vars.EDITION_MODEL }}
          EDITION_EFFORT: ${{ vars.EDITION_EFFORT }}
        run: npm run edition

      - name: Commit & push the new edition
        run: |
          git config user.name "chronicle-bot"
          git config user.email "actions@github.com"
          git add src/data/editions
          if git diff --staged --quiet; then
            echo "No new edition to commit."
          else
            git commit -m "📰 Edition for $(date -u +%Y-%m-%d)"
            git push
          fi
